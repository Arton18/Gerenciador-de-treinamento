<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; /* centro horizontal */
    align-items: center;     /* centro vertical */
    font-family: Arial;
}

form {
    padding: 20px;
    border: 1px solid #ccc;
    border-radius: 10px;
    width: 300px;
}

div {
    margin-bottom: 10px;
}

label {
    display: block;
    margin-bottom: 5px;
}
</style>

</head>
<body>
<form id="cadastro">
  <div>
    <label for="nome">Nome:</label> 	
    <input type="text" id="nome">
  </div>
  <div>
    <label for="email">Email: </label>
    <input type="email" id="email">
  </div>
  <div>
    <label for="senha">Senha:</label>
    <input type="password" id="senha" required>
  </div>
  <div>
    <label for="confirmaSenha">Confirme a Senha:</label>
    <input type="password" id="confirmaSenha" required>
  </div>
	<p id=erroSenha style="color:red;"></p>

    <input type="radio" name="tipo_user" value="aluno"> Aluno
    <input type="radio" name="tipo_user" value="treinador"> Treinador
<div>
    <button type="submit" style="font-size: 18px;padding: 10px 20px;margin-top:15px" >Cadastrar</button>
</div>
</form>
<script src="logincadastroback.js"></script>
</body>
</html>
