<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastrar Treino</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input, textarea {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Criar Treino</h2>

  <input type="text" id="titulo" placeholder="Título do treino">

  <textarea id="descricao" placeholder="Descrição do treino"></textarea>

  

  <button onclick="criarTreino()">Salvar</button>
</div>

<script>

console.log("Usuário:", usuario);

async function criarTreino() {
    const titulo = document.getElementById("titulo").value;
    const descricao = document.getElementById("descricao").value;
    const usuario = JSON.parse(localStorage.getItem("usuario"));
	

    
    const resposta = await fetch("/api/treinos", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            titulo,
            descricao,
            treinador_id:usuario.id
        })
    });

    const data = await resposta.json();
if(resposta.ok){
	alert("Treino criado");
	 window.location.href = "/treinopaginaTreinador.html";}
}
</script>

</body>
</html>
