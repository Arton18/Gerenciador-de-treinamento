<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            text-align: center;
        }

        h1{
            margin-bottom: 40px;
            color: #333;
            font-size: 36px;
        }

        .botoes{
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        button{
            width: 250px;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Área do Atleta</h1>

        <div class="botoes">
            <button onclick="abrirAdicionarTreinador()">
                Adicionar Treinador
            </button>

            <button onclick="abrirCronograma()">
                Cronograma
            </button>
        </div>
    </div>

    <script>
        function abrirAdicionarTreinador() {
            window.location.href = "adicionarTreinador.html";
        }

        function abrirCronograma() {
            window.location.href = "cronograma.html";
        }
    </script>

</body>
</html>
